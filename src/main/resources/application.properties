spring.application.name=auth-service
server.port=4001

#Postgres DB setting
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT Configuration (MUST match API Gateway's secret)
jwt.secret=${JWT_SECRET:BGiBX8GENIcKINk+z2A75yW5FeeGZWDNUdEODj0HHrE=}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:3600000}  # 1 hour (in milliseconds)
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:2592000000}  # 30 days (in milliseconds)

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=always

# Logging Levels
logging.level.com.uws.auth_service=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG

# Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n