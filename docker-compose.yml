
services:
  uws-auth-service-database:
    image: postgres:16
    container_name: uws-auth-service-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "root"
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - D:/Project2/upi-wallet-system/auth-service/auth-service/pgdata:/var/lib/postgresql/data

